version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/math_tutor
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_PROVIDER=openai
    depends_on:
      - mongo
    volumes:
      - ./backend/prompts:/app/prompts:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data: